<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Asado Tuki Fest 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;900&display=swap" rel="stylesheet">

<style>

:root{
--rojo:#e63012;
--naranja:#ff6b1a;
--negro:#0a0a0a;
--blanco:#f5f0e8;
--amarillo:#ffd23f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--negro);
color:var(--blanco);
font-family:'Barlow',sans-serif;
overflow-x:hidden;
}

#hero{
position:relative;
height:100dvh;
display:flex;
align-items:flex-end;
justify-content:center;
overflow:hidden;
}

#hero video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.55;
filter:saturate(1.3) contrast(1.1);
transform:scale(1.05);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(0,0,0,.2),
rgba(0,0,0,.9)
);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
padding:0 24px 70px;
max-width:500px;
animation:fadeUp .9s ease both;
}

.hero-tag{
background:var(--rojo);
font-size:11px;
letter-spacing:3px;
padding:6px 14px;
display:inline-block;
margin-bottom:16px;
}

.hero-title{
font-family:'Bebas Neue';
font-size:clamp(64px,18vw,110px);
line-height:.9;
}

.hero-title span{
color:var(--naranja);
display:block;
}

.hero-fecha{
font-size:13px;
letter-spacing:4px;
margin:18px 0 32px;
opacity:.6;
}

.btn-reservar{
background:var(--rojo);
color:white;
font-family:'Bebas Neue';
font-size:26px;
letter-spacing:3px;
padding:18px;
border:none;
width:100%;
cursor:pointer;
transition:.2s;
}

.btn-reservar:hover{
background:#c41f05;
}

.tap-sound{
margin-top:14px;
font-size:11px;
letter-spacing:2px;
opacity:.6;
}

.fire-bar{
position:absolute;
bottom:0;
height:3px;
left:0;
right:0;
background:linear-gradient(90deg,var(--rojo),var(--naranja),var(--amarillo));
background-size:200%;
animation:fire 2s linear infinite;
}

@keyframes fire{
from{background-position:200%}
to{background-position:0}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

</style>

</head>

<body>

<section id="hero">

<video id="heroVideo" autoplay muted loop playsinline preload="metadata">
<source src="tuki.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">

<span class="hero-tag">🔥 Evento Exclusivo</span>

<h1 class="hero-title">
Asado
<span>Tuki Fest</span>
</h1>

<p class="hero-fecha">
Jueves 19h · Edición 2026 · Lugares Limitados
</p>

<button class="btn-reservar">
🥩 Reservar mi lugar
</button>

<div class="tap-sound">
🔊 Tocar para activar sonido
</div>

</div>

<div class="fire-bar"></div>

</section>

<script>

const video=document.getElementById("heroVideo")

document.addEventListener("click",()=>{

video.muted=false
video.play()

const msg=document.querySelector(".tap-sound")
if(msg)msg.style.display="none"

},{once:true})

</script>

</body>
</html>
